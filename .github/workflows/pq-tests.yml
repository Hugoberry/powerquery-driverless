name: PQ tests

on:
  pull_request:
    branches: [main]
  push:
    # A vX.Y.Z tag runs the full suite and, only if it passes, publishes the
    # release. The release asset is therefore always a tested build.
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      sqlite_rows:
        description: Rows in the sqlite perf fixture
        default: "1000000"
      dbf_rows:
        description: Rows in the dbf perf fixture (keep modest while the reader is quadratic)
        default: "20000"

permissions:
  contents: read

jobs:
  pqtest:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate perf fixtures
        run: >
          python tests/perf/make_perf_fixtures.py
          --sqlite-rows ${{ github.event.inputs.sqlite_rows || '1000000' }}
          --dbf-rows ${{ github.event.inputs.dbf_rows || '20000' }}

      - name: Install Microsoft.PowerQuery.SdkTools
        run: nuget install Microsoft.PowerQuery.SdkTools -OutputDirectory .pqtools -NonInteractive

      # On a tag build the section document's [Version] is the tag; every other
      # trigger gets the 0.0.0 placeholder, so an unreleased mez is never
      # mistaken for a released one.
      - name: Resolve module version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF_NAME -match '^v(\d+\.\d+\.\d+)$') { $Matches[1] } else { '0.0.0' }
          Write-Host "Module version: $v"
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Build PQDriverless.mez
        run: pwsh tests/build-mez.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Run PQTest suite
        run: pwsh tests/run-tests.ps1

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pqtest-report
          path: |
            tests/out/report.md
            tests/out/report.json
            tests/out/logs/
            tests/queries/**/*.query.pqout

      - name: Upload mez
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # actions/upload-artifact always wraps the download in its own zip.
          # Naming the artifact identically to the file it contains
          # (PQDriverless.mez -> PQDriverless.mez.zip) makes Windows' default
          # "Extract All" folder name collide with the real file name, so the
          # extracted PQDriverless.mez looks like it contains itself and Power
          # BI Desktop won't load it. Keep the artifact name distinct so the
          # extracted file is unambiguous.
          name: PQDriverless-mez
          path: tests/out/PQDriverless.mez
          if-no-files-found: error

  # Publishes the tested mez as a release asset, so the download link in the
  # docs (releases/latest/download/PQDriverless.mez) is permanent and works
  # without a GitHub account - unlike an Actions artifact, which expires and
  # requires a signed-in user.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pqtest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the tested mez
        uses: actions/download-artifact@v4
        with:
          name: PQDriverless-mez
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/PQDriverless.mez
          --repo "$GITHUB_REPOSITORY"
          --title "$GITHUB_REF_NAME"
          --generate-notes
